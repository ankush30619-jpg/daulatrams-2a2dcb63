<!DOCTYPE html>
<html lang="en" data-anim="full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All Products — Daulatram's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="pages.css">
</head>
<body>
<script>document.documentElement.classList.add('js-anim'); window.ACTIVE_NAV = 'shop';</script>

<!-- Page hero -->
<div class="page-hero">
  <div class="breadcrumb"><a href="home.html">Home</a> &rsaquo; <span>Shop</span></div>
  <h1>All Products</h1>
  <p>Pure Ayurvedic formulas — crafted with three generations of wisdom.</p>
</div>

<main id="main-content">
  <!-- Toolbar -->
  <div class="shop-toolbar">
    <div class="container tb-inner">
      <span class="count" id="prod-count">Loading...</span>
      <div class="cat-filter-pills" id="cat-pills">
        <button class="cat-pill active" data-cat="all">All</button>
        <button class="cat-pill" data-cat="Men's Wellness">Men's Wellness</button>
        <button class="cat-pill" data-cat="Women's Wellness">Women's Wellness</button>
        <button class="cat-pill" data-cat="Hair Care">Hair Care</button>
        <button class="cat-pill" data-cat="Skin Care">Skin Care</button>
        <button class="cat-pill" data-cat="Desi Ghee">Desi Ghee</button>
        <button class="cat-pill" data-cat="Honey">Honey</button>
        <button class="cat-pill" data-cat="Weight Loss">Weight Loss</button>
      </div>
      <select class="sort-select" id="sort-sel">
        <option value="default">Sort: Featured</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
        <option value="rating">Best Rated</option>
      </select>
    </div>
  </div>

  <!-- Product grid -->
  <section class="section" style="background:var(--cream-warm); padding-top:40px;">
    <div class="container">
      <div class="shop-grid sr-stagger" id="shop-grid"></div>
      <div id="empty-state" style="display:none; text-align:center; padding:80px 0;">
        <div style="font-size:48px; margin-bottom:16px;">🌿</div>
        <h3 style="font-family:var(--font-heading); font-size:24px; margin-bottom:10px;">No products found</h3>
        <p style="color:var(--text-muted); margin-bottom:24px;">Try a different category filter.</p>
        <button class="btn btn-primary" onclick="document.querySelector('[data-cat=all]').click()">Browse All</button>
      </div>
    </div>
  </section>
</main>

<div id="tweaks-root"></div>
<script src="catalog.js"></script>
<script src="data.js"></script>
<script src="render.js"></script>
<script src="page-shell.js"></script>
<script src="site.js"></script>

<script>
(function(){
  const grid = document.getElementById('shop-grid');
  const countEl = document.getElementById('prod-count');
  const emptyEl = document.getElementById('empty-state');
  const pills = document.querySelectorAll('.cat-pill');
  const sortSel = document.getElementById('sort-sel');
  let activeCat = 'all';

  // Read URL param
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat) activeCat = urlCat.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase());

  function renderGrid() {
    const catalog = window.__CATALOG || [];
    let items = activeCat === 'all' ? [...catalog] : catalog.filter(p => p.category.toLowerCase() === activeCat.toLowerCase());
    const sort = sortSel.value;
    if (sort==='low') items.sort((a,b)=>a.price-b.price);
    else if (sort==='high') items.sort((a,b)=>b.price-a.price);
    else if (sort==='rating') items.sort((a,b)=>(b.rating||0)-(a.rating||0));
    countEl.textContent = items.length + ' products';
    if (!items.length) { grid.innerHTML=''; emptyEl.style.display='block'; return; }
    emptyEl.style.display = 'none';
    grid.innerHTML = items.map(p => {
      const off = p.orig ? Math.round((1-p.price/p.orig)*100) : 0;
      const badges = [];
      if (off) badges.push(`<span class="pc-badge discount">-${off}%</span>`); else badges.push('<span></span>');
      if (p.tag==='bestseller') badges.push('<span class="pc-badge best">★ BESTSELLER</span>');
      else if (p.tag==='new') badges.push('<span class="pc-badge new">NEW</span>');
      else badges.push('<span></span>');
      const stars = '★★★★★☆☆☆☆☆'.slice(0, Math.round(p.rating||4.5))+'☆☆☆☆☆'.slice(0,5-Math.round(p.rating||4.5));
      return `<article class="product-card">
        <a href="product.html?id=${p.id}" style="display:contents">
        <div class="pc-img"><div class="pc-badges">${badges.join('')}</div>
          <button class="pc-wish" aria-label="Wishlist" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
          <img src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#F0E8D8,#EDE0C8)'">
        </div></a>
        <div class="pc-body">
          <div class="pc-rating"><span class="stars">${stars}</span> ${p.rating||4.5} (${(p.reviews||0).toLocaleString('en-IN')})</div>
          <a href="product.html?id=${p.id}"><h3 class="pc-name">${p.name} <span style="font-size:0.7em;color:var(--text-muted)">${p.variant}</span></h3></a>
          <div class="pc-price"><span class="sale">₹${p.price.toLocaleString('en-IN')}</span>${p.orig?`<span class="orig">₹${p.orig.toLocaleString('en-IN')}</span>`:''} ${off?`<span class="off">${off}% OFF</span>`:''}</div>
          <a href="product.html?id=${p.id}" class="btn btn-primary btn-block btn-sm">View Product</a>
        </div>
      </article>`;
    }).join('');
    // re-init scroll reveals
    grid.querySelectorAll('.product-card').forEach((el,i)=>{el.style.transitionDelay=(i*60)+'ms';el.style.opacity='1';});
  }

  // Sync active pill to URL cat
  pills.forEach(p=>{
    if(activeCat==='all' && p.dataset.cat==='all') p.classList.add('active');
    else if(p.dataset.cat.toLowerCase()===activeCat.toLowerCase()) { p.classList.remove('active'); document.querySelector('[data-cat=all]').classList.remove('active'); p.classList.add('active'); }
    p.addEventListener('click',()=>{
      pills.forEach(x=>x.classList.remove('active')); p.classList.add('active');
      activeCat = p.dataset.cat; renderGrid();
    });
  });
  sortSel.addEventListener('change', renderGrid);
  renderGrid();
})();
</script>

</body>
</html>
