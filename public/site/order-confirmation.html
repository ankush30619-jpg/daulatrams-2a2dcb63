<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Daulatram's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="pages.css"><link rel="stylesheet" href="store.css">
</head>
<body>
<script>window.ACTIVE_NAV='';</script>
<main id="main-content">
  <div class="page-shell">
    <div class="oc-card" id="oc-root">Loading…</div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="catalog.js"></script>
<script src="auth.js"></script><script src="store.js"></script>
<script src="page-shell.js"></script><script src="site.js"></script>
<script>
(async function(){
  const root = document.getElementById("oc-root");
  const num = new URLSearchParams(location.search).get("order");
  setTimeout(async ()=>{
    const sb = window.dr.auth.client(); const u = window.dr.auth.user;
    if (!u){ root.innerHTML = `<h2 class="oc-num">Thank you!</h2><p>Sign in to track your order.</p><a href="auth.html" class="btn btn-primary">Sign In</a>`; return; }
    const { data: order } = await sb.from("orders").select("*").or(`order_number.eq.${num},id.eq.${num}`).maybeSingle();
    if (!order){ root.innerHTML = `<h2>Order not found</h2>`; return; }
    const { data: items } = await sb.from("order_items").select("*").eq("order_id", order.id);
    const addr = order.shipping_address || {};
    root.innerHTML = `
      <div class="oc-tick">✓</div>
      <h2 style="font-family:'Cormorant Garamond',serif;color:#0B5132;font-size:34px;margin:0">Order Confirmed!</h2>
      <p style="color:#666;margin:8px 0 0">Thank you for shopping with Daulatram's.</p>
      <div class="oc-num">${order.order_number}</div>
      <div class="oc-items">
        ${(items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee5d5"><span>${i.product_name} × ${i.quantity}</span><strong>₹${(i.line_total).toLocaleString("en-IN")}</strong></div>`).join("")}
        <div style="display:flex;justify-content:space-between;padding-top:12px;font-weight:700;color:#0B5132;font-size:18px"><span>Total</span><span>₹${order.total.toLocaleString("en-IN")}</span></div>
      </div>
      <div style="text-align:left;background:#FBF7EE;border-radius:12px;padding:16px"><strong>Shipping to:</strong><br>${addr.label||""}<br>${addr.line1||""}${addr.line2?", "+addr.line2:""}<br>${addr.city||""}, ${addr.state||""} ${addr.pincode||""}<br>${addr.phone||""}</div>
      <a href="account.html#orders" class="btn btn-primary" style="margin-top:20px">View My Orders</a>
      <a href="shop.html" class="btn btn-outline" style="margin-top:10px">Continue Shopping</a>`;
  }, 600);
})();
</script>
</body></html>
