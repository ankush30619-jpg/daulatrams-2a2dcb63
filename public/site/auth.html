<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Daulatram's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="pages.css">
<link rel="stylesheet" href="store.css">
</head>
<body>
<script>window.ACTIVE_NAV='';</script>
<main id="main-content">
  <div class="page-shell" style="max-width:520px">
    <div class="auth-wrap">
      <div style="text-align:center;margin-bottom:18px">
        <img src="/__l5e/assets-v1/8b91c49d-e362-4b9e-8d22-d4250fc957c2/daulatrams-logo.png" alt="Daulatram's" style="height:46px">
      </div>
      <div class="auth-tabs" role="tablist">
        <button id="tab-in" class="active">Sign In</button>
        <button id="tab-up">Create Account</button>
      </div>
      <div id="msg"></div>
      <form id="form-in" class="auth-form">
        <div><label>Email</label><input type="email" name="email" required></div>
        <div><label>Password</label><input type="password" name="password" required minlength="6"></div>
        <button class="btn btn-primary" type="submit">Sign In</button>
        <a href="#" id="forgot" style="text-align:center;font-size:13px;color:#0B5132;margin-top:4px">Forgot password?</a>
      </form>
      <form id="form-up" class="auth-form" style="display:none">
        <div><label>Full Name</label><input type="text" name="full_name" required></div>
        <div><label>Email</label><input type="email" name="email" required></div>
        <div><label>Password</label><input type="password" name="password" required minlength="6"></div>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <div class="auth-divider">or</div>
      <button class="btn-google" id="g-btn">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.7 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C33.6 6 29 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.3 19 14 24 14c3.1 0 5.8 1.1 8 3l5.7-5.7C33.6 6 29 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5 0 9.5-1.9 12.9-5l-6-5C29 35.5 26.6 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.5l6 5C40.9 35.1 44 30 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
        Continue with Google
      </button>
      <div class="auth-link">By continuing you agree to our terms.</div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="catalog.js"></script>
<script src="auth.js"></script>
<script src="store.js"></script>
<script src="page-shell.js"></script>
<script src="site.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const redirect = params.get("redirect") || "account.html";
  const $ = s => document.querySelector(s);
  const msg = $("#msg");
  function show(html, ok){ msg.innerHTML = `<div class="${ok?'ok':'err'}">${html}</div>`; }
  $("#tab-in").onclick = ()=>{ $("#tab-in").classList.add("active"); $("#tab-up").classList.remove("active"); $("#form-in").style.display="flex"; $("#form-up").style.display="none"; msg.innerHTML=""; };
  $("#tab-up").onclick = ()=>{ $("#tab-up").classList.add("active"); $("#tab-in").classList.remove("active"); $("#form-up").style.display="flex"; $("#form-in").style.display="none"; msg.innerHTML=""; };
  if (params.get("mode")==="signup") $("#tab-up").click();

  // If already signed in, bounce
  setTimeout(()=>{ if (window.dr && window.dr.auth && window.dr.auth.user) location.href = redirect; }, 600);

  $("#form-in").onsubmit = async (e)=>{ e.preventDefault();
    const f = new FormData(e.target);
    const { error } = await window.dr.auth.signInPassword(f.get("email"), f.get("password"));
    if (error) return show(error.message);
    show("Signed in! Redirecting…", true);
    setTimeout(()=> location.href = redirect, 500);
  };
  $("#form-up").onsubmit = async (e)=>{ e.preventDefault();
    const f = new FormData(e.target);
    const { data, error } = await window.dr.auth.signUp(f.get("email"), f.get("password"), f.get("full_name"));
    if (error) return show(error.message);
    if (data.session) { show("Account created! Redirecting…", true); setTimeout(()=> location.href = redirect, 500); }
    else show("Check your email to confirm your account.", true);
  };
  $("#g-btn").onclick = async ()=>{
    const { error } = await window.dr.auth.signInWithGoogle();
    if (error) show(error.message);
  };
  $("#forgot").onclick = async (e)=>{ e.preventDefault();
    const email = prompt("Enter your account email:"); if (!email) return;
    const { error } = await window.dr.auth.resetPassword(email);
    if (error) show(error.message); else show("Password reset link sent to "+email, true);
  };
})();
</script>
</body>
</html>
